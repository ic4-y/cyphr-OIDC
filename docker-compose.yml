services:
  bridge:
    build:
      context: ./bridge
      dockerfile: Dockerfile
    container_name: cyphr-bridge
    environment:
      - BRIDGE_PORT=8080
      - BRIDGE_ISSUER_URL=http://localhost:8080
      - BRIDGE_SIGNING_KEY_PATH=/keys/signing-key.pem
      - BRIDGE_USERS
      - BRIDGE_CLIENTS
    volumes:
      - ./keys:/keys
    ports:
      - "8080:8080"
    networks:
      - cyphrnet

  redis:
    image: redis:7-alpine
    container_name: cyphr-redis
    ports:
      - "6379:6379"
    networks:
      - cyphrnet

  forgejo:
    image: codeberg.org/forgejo/forgejo:14
    container_name: forgejo
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - FORGEJO__database__DB_TYPE=sqlite3
      - FORGEJO__server__ROOT_URL=http://localhost:3000
      - FORGEJO__security__INSTALL_LOCK=true
      - FORGEJO__oauth2_client__USERNAME=email
    restart: always
    networks:
      - cyphrnet
    volumes:
      - ./forgejo:/data
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "3000:3000"
      - "222:22"
    depends_on:
      bridge:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 5s
      timeout: 3s
      retries: 12

  forgejo-init:
    image: codeberg.org/forgejo/forgejo:14
    container_name: forgejo-init
    user: "1000:1000"
    depends_on:
      forgejo:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Creating admin user..."
        forgejo admin user create \
          --username forgejo-admin \
          --password admin123 \
          --email admin@localhost \
          --admin \
          --must-change-password=false || echo "Admin user already exists or creation failed"
        echo "Registering CyphrMask OIDC auth source..."
        forgejo admin auth add-oauth \
          --name "CyphrMask" \
          --provider "openidConnect" \
          --key "forgejo" \
          --secret "forgejo-secret" \
          --auto-discover-url "http://cyphr-bridge:8080/.well-known/openid-configuration" \
          --scopes openid \
          --scopes email \
          --scopes profile || echo "CyphrMask auth source already exists or registration failed"
        echo "Forgejo initialization complete."
    networks:
      - cyphrnet
    volumes:
      - ./forgejo:/data

networks:
  cyphrnet:
    driver: bridge
